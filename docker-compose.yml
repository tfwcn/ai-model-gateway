version: "3.8"

services:
  ai-model-gateway:
    build: .
    container_name: ai-model-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./models.yaml:/app/models.yaml:ro
      - playwright-cache:/app/.cache/ms-playwright
    restart: unless-stopped
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge

volumes:
  playwright-cache:
